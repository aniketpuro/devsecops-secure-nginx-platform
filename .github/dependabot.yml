version: 2
updates:
  # GitHub Actions workflows 
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "github-actions"
    open-pull-requests-limit: 10

  # Dockerfiles  (images update)
  - package-ecosystem: "docker"
    directory: "/docker"          
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "docker"
    open-pull-requests-limit: 5

  # Helm charts dependencies
  - package-ecosystem: "helm"
    directory: "/helm/devsecops-secure-nginx-platform"   
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "helm"
    open-pull-requests-limit: 5

  # Kubernetes manifests Docker images update 
  - package-ecosystem: "docker"
    directory: "/kubernetes"      
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "docker"
  
  - package-ecosystem: "docker"
    directory: "/argocd"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "docker"
