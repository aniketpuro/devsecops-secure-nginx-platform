version: '3.9'

services:
  # 1. Frontend - Next.js
  frontend:
    build: ./services/frontend
    ports:
      - "3000:3000"
    stdin_open: true
    tty: true
    restart: unless-stopped

  # 2. API Gateway (Nginx)
  gateway:
    build: ./services/gateway
    ports:
      - "8080:8080"
    depends_on:
      - converter
      - identity-service
      - file-service
    restart: unless-stopped

  # 3. Identity Service (Auth)
  identity-service:
    build: ./services/identity-service
    ports:
      - "5001:5000"
    environment:
      - RABBITMQ_HOST=rabbitmq
    depends_on:
      - rabbitmq
    restart: unless-stopped

  # 4. Converter Service (Video to MP3)
  converter:
    build: ./services/converter-service
    ports:
      - "5000:5000"
    environment:
      - RABBITMQ_HOST=rabbitmq
    depends_on:
      - rabbitmq
    restart: unless-stopped

  # 5. Notification Service
  notification:
    build: ./services/notification-service
    environment:
      - RABBITMQ_HOST=rabbitmq
    depends_on:
      - rabbitmq
    restart: unless-stopped

  # 6. File Service
  file-service:
    build: ./services/file-service
    ports:
      - "5002:5000"
    environment:
      - RABBITMQ_HOST=rabbitmq
    depends_on:
      - rabbitmq
    restart: unless-stopped

  # 7. User Service
  user-service:
    build: ./services/user-service
    ports:
      - "5003:5000"
    environment:
      - RABBITMQ_HOST=rabbitmq
    depends_on:
      - rabbitmq
    restart: unless-stopped

  # 8. Database - PostgreSQL
  database:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: mp3converter
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  # 9. RabbitMQ
  rabbitmq:
    image: rabbitmq:3.13-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    restart: unless-stopped

volumes:
  postgres-data:
  rabbitmq-data: