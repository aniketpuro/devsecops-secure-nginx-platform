apiVersion: v1
kind: Service
metadata:
  name: {{ include "devsecops-secure-nginx-platform.fullname" . }}
  labels:
    {{- include "devsecops-secure-nginx-platform.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app.kubernetes.io/name: {{ include "devsecops-secure-nginx-platform.name" . }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
    - name: metrics
      port: 9113
      targetPort: 9113
      protocol: TCP
