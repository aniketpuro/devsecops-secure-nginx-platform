apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "devsecops-secure-nginx-platform.fullname" . }}-rolebinding
  labels:
    {{- include "devsecops-secure-nginx-platform.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ .Values.serviceAccount.name }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "devsecops-secure-nginx-platform.fullname" . }}-role
