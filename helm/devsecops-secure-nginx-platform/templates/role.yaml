  labels:
    {{- include "devsecops-secure-nginx-platform.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["secure-nginx-config"]
    verbs: ["get"]
