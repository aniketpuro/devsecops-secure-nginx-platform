name: Pull Request Validation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: read
  security-events: write

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  VERSION: ${{ vars.APP_VERSION || '1.0.0' }}

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af76f # v4.2.2
        with:
          fetch-depth: 0

      - name: Derive build metadata
        id: meta
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${VERSION}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Test static content
        run: ./scripts/test.sh

      - name: Run Semgrep SAST
        uses: returntocorp/semgrep-action@v1
        with:
          config: security/semgrep.yml

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITLEAKS_CONFIG: security/gitleaks.toml
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0 SAFE
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: table
          exit-code: "1"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@988b5a0280414f521da01fcc63a27d2b7d1d2c5f # v3.6.1

      - name: Build container image
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5d226ca3c796b4e2c0 # v6.13.0
        with:
          context: .
          file: docker/Dockerfile
          load: true
          push: false
          tags: |
            local/devsecops-secure-nginx-platform:${{ steps.meta.outputs.image_tag }}
            local/devsecops-secure-nginx-platform:${{ steps.meta.outputs.short_sha }}

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: local/devsecops-secure-nginx-platform:${{ steps.meta.outputs.image_tag }}
          format: cyclonedx-json
          output-file: sbom.cdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4.6.2
        with:
          name: sbom-${{ steps.meta.outputs.image_tag }}
          path: sbom.cdx.json

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0 SAFE
        with:
          image-ref: local/devsecops-secure-nginx-platform:${{ steps.meta.outputs.image_tag }}
          format: table
          ignore-unfixed: true
          vuln-type: os,library
          severity: HIGH,CRITICAL
          exit-code: "1"
