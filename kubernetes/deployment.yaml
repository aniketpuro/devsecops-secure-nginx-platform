apiVersion: apps/v1
kind: Deployment
metadata:
  name: devsecops-secure-nginx-platform
  namespace: devsecops-secure-nginx
  labels:
    app.kubernetes.io/name: devsecops-secure-nginx-platform
    app.kubernetes.io/component: web
spec:
  replicas: 3
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: devsecops-secure-nginx-platform
  template:
    metadata:
      labels:
        app.kubernetes.io/name: devsecops-secure-nginx-platform
        app.kubernetes.io/component: web
        owner: platform-team
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "devsecops-secure-nginx"
        vault.hashicorp.com/agent-pre-populate-only: "true"
        vault.hashicorp.com/agent-inject-secret-runtime.env: "secret/data/devsecops-secure-nginx-platform/runtime"
        vault.hashicorp.com/agent-inject-template-runtime.env: |
          {{- with secret "secret/data/devsecops-secure-nginx-platform/runtime" -}}
          APP_ENV={{ .Data.data.APP_ENV }}
          CONTACT_EMAIL={{ .Data.data.CONTACT_EMAIL }}
          {{- end }}
    spec:
      serviceAccountName: secure-nginx-sa
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: nginx
          image: devsecops-secure-nginx-platform:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /var/cache/nginx
            - name: run
              mountPath: /var/run
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            runAsUser: 101
            runAsGroup: 101
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
        - name: nginx-exporter
          image: nginx/nginx-prometheus-exporter:1.3.0
          args:
            - -nginx.scrape-uri=http://127.0.0.1:8080/nginx_status
          ports:
            - name: metrics
              containerPort: 9113
              protocol: TCP
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      volumes:
        - name: nginx-config
          configMap:
            name: secure-nginx-config
        - name: tmp
          emptyDir: {}
        - name: cache
          emptyDir: {}
        - name: run
          emptyDir: {}
