grafana:
  admin:
    existingSecret: grafana-admin-credentials
    userKey: admin-user
    passwordKey: admin-password
  defaultDashboardsTimezone: browser
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: devsecops-secure-nginx-platform
          orgId: 1
          folder: DevSecOps
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/devsecops-secure-nginx-platform
  dashboards:
    devsecops-secure-nginx-platform:
      secure-nginx:
        json: |
          {}
