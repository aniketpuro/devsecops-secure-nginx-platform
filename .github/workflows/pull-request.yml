name: Pull Request Validation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: read
  security-events: write

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  VERSION: ${{ vars.APP_VERSION || '1.0.0' }}

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      # 1. ADDED: Detect changes in specific paths
      - name: Check for Docker modifications
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            docker:
              - 'docker/**'

      - name: Derive build metadata
        id: meta
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${VERSION}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Test static content
        run: echo "✅ No application tests configured yet - skipping"

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2

      # Note: FS scan runs on all PRs to catch vulnerable app dependencies (like requirements.txt)
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1  # v0.35.0 - SAFE
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: table
          exit-code: "1"

      # 2. ADDED: "if" condition to Docker setup
      - name: Set up Docker Buildx
        if: steps.filter.outputs.docker == 'true'
        uses: docker/setup-buildx-action@v3

      # 3. ADDED: "if" condition to Docker build
      - name: Build container image
        if: steps.filter.outputs.docker == 'true'
        uses: docker/build-push-action@v6.13.0
        with:
          context: .
          file: docker/Dockerfile
          load: true
          push: false
          tags: |
            local/devsecops-secure-nginx-platform:${{ steps.meta.outputs.image_tag }}
            local/devsecops-secure-nginx-platform:${{ steps.meta.outputs.short_sha }}

      # 4. ADDED: "if" condition to Trivy image scan
      - name: Run Trivy image scan
        if: steps.filter.outputs.docker == 'true'
        uses: uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1  # v0.35.0 - SAFE
        with:
          image-ref: local/devsecops-secure-nginx-platform:${{ steps.meta.outputs.image_tag }}
          format: table
          ignore-unfixed: true
          vuln-type: os,library
          severity: HIGH,CRITICAL
          exit-code: "1"
