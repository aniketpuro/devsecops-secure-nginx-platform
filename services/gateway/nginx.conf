events {}

http {
    server {
        listen 8080;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-Content-Type-Options "nosniff";
        add_header X-XSS-Protection "1; mode=block";
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains";

        # CORS (Frontend ke liye)
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization,Content-Type' always;

        location / {
            root /usr/share/nginx/html;   # agar static frontend bhi serve karna ho
            try_files $uri $uri/ =404;
        }

        # API Routes
        location /api/auth/ {
            proxy_pass http://identity-service:5000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/convert/ {
            proxy_pass http://converter-service:5000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/upload/ {
            proxy_pass http://converter-service:5000/;
            proxy_set_header Host $host;
            client_max_body_size 100m;   # badi files ke liye
        }

        # Health check
        location /health {
            return 200 "Gateway healthy\n";
            add_header Content-Type text/plain;
        }
    }
}