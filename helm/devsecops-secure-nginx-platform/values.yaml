replicaCount: 3

image:
  repository: devsecops-secure-nginx-platform
  tag: "local"
  pullPolicy: IfNotPresent

serviceAccount:
  create: true
  name: secure-nginx-sa
  automountServiceAccountToken: false

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 101
  runAsGroup: 101
  seccompProfile:
    type: RuntimeDefault

securityContext:
  runAsNonRoot: true
  runAsUser: 101
  runAsGroup: 101
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

probes:
  path: /healthz
  liveness:
    initialDelaySeconds: 10
    periodSeconds: 15
    timeoutSeconds: 3
    failureThreshold: 3
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3

vault:
  enabled: true
  role: devsecops-secure-nginx
  secretPath: secret/data/devsecops-secure-nginx-platform/runtime

networkPolicy:
  ingressNamespace: ingress-nginx
  monitoringNamespace: monitoring
  vaultNamespace: vault

serviceMonitor:
  enabled: true
  interval: 30s
  labels:
    release: monitoring

pdb:
  minAvailable: 2
