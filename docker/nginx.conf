events {
    worker_connections 1024;
}

http {
    server {
        listen 80;
        server_name localhost;

        # Static files (agar koi frontend ho toh)
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ =404;
        }

        # Secure Identity Microservice (High-Level)
        location /api/v1/auth/ {
            proxy_pass http://secure-identity-service:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Security Headers
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "DENY" always;
            add_header X-XSS-Protection "1; mode=block" always;
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        }

        # Health checks
        location /health {
            proxy_pass http://secure-identity-service:8080/health;
        }

        location /metrics {
            proxy_pass http://secure-identity-service:8080/metrics;
        }
    }
}